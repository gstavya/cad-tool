<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="toolbar-section">
        <span class="toolbar-label">View</span>
        <div class="btn-group">
          <button class="btn plane-btn" data-plane="3D">3D</button>
          <button class="btn plane-btn active" data-plane="XY">XY</button>
          <button class="btn plane-btn" data-plane="XZ">XZ</button>
          <button class="btn plane-btn" data-plane="YZ">YZ</button>
        </div>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-section">
        <span class="toolbar-label">Draw</span>
        <div class="btn-group">
          <button class="btn tool-btn" data-tool="rectangle" title="Rectangle">
            <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="5" width="18" height="14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="btn tool-btn" data-tool="circle" title="Circle">
            <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="btn tool-btn" data-tool="polygon" title="Polygon">
            <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="12,2 22,9 18,22 6,22 2,9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="btn tool-btn" data-tool="extrude-select" title="Select regions to extrude">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 10 L12 6 L20 10 L12 14 Z M4 10 V16 L12 20 V14 M20 10 V16 L12 20" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-section">
        <button class="btn" id="btn-select" title="Select / Move">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 4 L12 22 L15 14 L22 12 Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          Select
        </button>
        <button class="btn" id="btn-delete" title="Delete Selected">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6 L18 18 M18 6 L6 18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          Delete
        </button>
        <button class="btn" id="btn-clear" title="Clear Plane">Clear Plane</button>
        <button class="btn" id="btn-extrude" title="Extrude selected regions">Extrude</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-section">
        <button class="btn" id="btn-save" title="Save">Save</button>
        <button class="btn" id="btn-load" title="Load">Load</button>
      </div>
      <div class="toolbar-spacer"></div>
      <div class="toolbar-section">
        <label class="toggle-label">
          <input type="checkbox" id="toggle-grid" checked> Grid
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="toggle-snap" checked> Snap
        </label>
      </div>
    </div>

    <div id="viewport-container">
      <canvas id="viewport"></canvas>
      <div id="view-badge">XY Plane</div>
      <div id="sketch-panel">
        <h3>Sketches</h3>
        <div id="sketch-list"></div>
      </div>
    </div>

    <div id="statusbar">
      <span id="status-tool">Tool: Select</span>
      <span id="status-plane">Plane: XY</span>
      <span id="status-coords">X: 0.00 Y: 0.00</span>
      <span id="status-info"></span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
